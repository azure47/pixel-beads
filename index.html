<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 智能拼豆图纸生成器</title>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/bundle.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); max-width: 900px; width: 100%; text-align: center; }
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 20px 0; padding: 20px; border-top: 1px solid #eee; }
        canvas { border: 1px solid #ddd; background-image: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%), linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%); background-size: 20px 20px; background-position: 0 0, 10px 10px; max-width: 100%; height: auto; margin-top: 20px; }
        button { background: #2ea44f; color: white; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px;}
        button:disabled { background: #94d3a2; cursor: not-allowed; }
        .status { color: #555; font-size: 16px; margin: 15px 0; font-weight: 500; min-height: 24px;}
        input[type=file] { padding: 10px; background: #f0f0f0; border-radius: 5px;}
    </style>
</head>
<body>

<div class="card">
    <h1>🎨 拼豆图纸生成器 (修复版)</h1>
    <p>自动压缩大图 • AI 智能抠图 • 一键下载图纸</p>
    
    <div class="controls">
        <input type="file" id="upload" accept="image/*">
        <div style="display: flex; align-items: center;">
            <label style="margin-right: 10px;">横向豆子数: </label>
            <input type="number" id="gridSize" value="50" min="10" max="150" style="width: 70px; padding: 5px;">
        </div>
    </div>
    
    <div id="status" class="status">请选择一张图片...</div>
    <button id="downloadBtn" style="display: none;">⬇️ 下载图纸</button>
    <br>
    <canvas id="outputCanvas"></canvas>
</div>

<script>
    const upload = document.getElementById('upload');
    const gridSizeInput = document.getElementById('gridSize');
    const status = document.getElementById('status');
    const downloadBtn = document.getElementById('downloadBtn');
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');

    // 基础拼豆色卡
    const PALETTE = [
        {rgb:[0,0,0]},{rgb:[255,255,255]},{rgb:[190,0,0]},{rgb:[0,0,150]},
        {rgb:[255,230,0]},{rgb:[0,120,0]},{rgb:[255,192,203]},{rgb:[128,0,128]},
        {rgb:[255,165,0]},{rgb:[139,69,19]},{rgb:[128,128,128]}
    ];

    // === 新增：图片压缩函数 ===
    function resizeImage(file, maxWidth) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.onload = () => {
                let width = img.width;
                let height = img.height;
                // 如果图片过大，计算缩放比例
                if (width > maxWidth) {
                    height = Math.round((height * maxWidth) / width);
                    width = maxWidth;
                }
                // 使用 Canvas 进行绘制压缩
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                // 将 Canvas 内容转回 Blob 对象
                canvas.toBlob((blob) => {
                    status.innerText = `📦 图片已压缩至 ${width}x${height}，准备进行 AI 处理...`;
                    resolve(blob);
                }, file.type, 0.9);
            };
            img.onerror = reject;
        });
    }

    upload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        downloadBtn.style.display = 'none';
        upload.disabled = true;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        try {
            status.innerText = "🔄 正在预处理图片 (压缩)...";
            // 1. 先压缩图片，限制最大宽度为 1024px
            const resizedBlob = await resizeImage(file, 1024);

            status.innerText = "🤖 AI 正在识别主体并抠图 (首次运行需加载模型，请稍候)...";
            // 2. 将压缩后的图片传给 AI
            const processedBlob = await imglyRemoveBackground(resizedBlob);
            
            const img = new Image();
            img.src = URL.createObjectURL(processedBlob);
            img.onload = () => {
                status.innerText = "🎨 正在生成拼豆图纸...";
                generatePattern(img);
                status.innerText = "✨ 生成成功！点击下方按钮保存图纸。";
                upload.disabled = false;
                downloadBtn.style.display = 'inline-block';
            };
        } catch (err) {
            console.error(err);
            status.innerText = "❌ 处理失败: " + (err.message || "可能是网络问题或模型加载失败");
            upload.disabled = false;
        }
    });

    function generatePattern(img) {
        const beadsX = parseInt(gridSizeInput.value);
        const ratio = img.height / img.width;
        const beadsY = Math.round(beadsX * ratio);
        const cellSize = 15; // 网页显示大小

        canvas.width = beadsX * cellSize;
        canvas.height = beadsY * cellSize;

        const offCanvas = document.createElement('canvas');
        const offCtx = offCanvas.getContext('2d');
        offCanvas.width = beadsX;
        offCanvas.height = beadsY;
        // 关键：关闭图像平滑处理，让像素化更清晰
        offCtx.imageSmoothingEnabled = false; 
        offCtx.drawImage(img, 0, 0, beadsX, beadsY);
        const imgData = offCtx.getImageData(0, 0, beadsX, beadsY).data;

        for (let y = 0; y < beadsY; y++) {
            for (let x = 0; x < beadsX; x++) {
                const i = (y * beadsX + x) * 4;
                const a = imgData[i+3];
                if (a > 100) { // 只绘制有内容的区域
                    const color = findNearestColor(imgData[i], imgData[i+1], imgData[i+2]);
                    drawBead(x, y, cellSize, color);
                }
            }
        }
    }

    function findNearestColor(r, g, b) {
        let min = Infinity, best = PALETTE[0].rgb;
        for (const item of PALETTE) {
            const d = (r-item.rgb[0])**2 + (g-item.rgb[1])**2 + (b-item.rgb[2])**2;
            if (d < min) { min = d; best = item.rgb; }
        }
        return best;
    }

    function drawBead(x, y, size, rgb) {
        ctx.fillStyle = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
        ctx.beginPath();
        ctx.arc(x*size + size/2, y*size + size/2, size/2 - 0.5, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(x*size + size/2, y*size + size/2, size/4, 0, Math.PI*2);
        ctx.fill();
    }

    downloadBtn.onclick = () => {
        const link = document.createElement('a');
        link.download = '拼豆图纸.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    };
</script>
</body>
</html>
